services:
  - type: web
    name: nutrio-backend
    runtime: node
    buildCommand: npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nutrio-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: nutrio-db
    plan: free
